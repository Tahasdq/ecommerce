# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - ecommerce

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: npm install, build, and test
        run: |
          npm ci
          npm run build 

        env:
            NEXT_PUBLIC_BACKEND_BASE_LOCAL: ${{ secrets.NEXT_PUBLIC_BACKEND_BASE_LOCAL }} 

      
      - name: Create deployment package
        run: |
          mkdir deploy
          cp -r build/standalone/* deploy/
          cp -r build/static deploy/build/
          cd deploy
          zip -r ../deployment.zip * 


      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deployment.zip 


  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app  
          path: .
       
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_EEC9745D932142ADB9E07A817B1A09BB }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_3D1E3650C6414A9485702E4A4E6E5798 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_9C1A9091E6F44A70836033F9EA21A517 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'ecommerce'
          slot-name: 'Production'
          package: deployment.zip
          clean: true
          